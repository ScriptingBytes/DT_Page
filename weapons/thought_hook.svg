<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="chainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dfe6e9"/>
      <stop offset="40%" stop-color="#a4b0c1"/>
      <stop offset="100%" stop-color="#576574"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2d3436"/>
      <stop offset="30%" stop-color="#636e72"/>
      <stop offset="70%" stop-color="#4a5568"/>
      <stop offset="100%" stop-color="#2d3436"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="500" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="396" height="496" rx="14" fill="none" stroke="#a4b0c1" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="200" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#c8d6e5" font-weight="bold">Thought Hook</text>
  <text x="200" y="55" text-anchor="middle" font-family="monospace" font-size="11" fill="#a4b0c1">MOVEMENT · ALL ROLES</text>

  <!-- Trajectory arc -->
  <path d="M200,390 Q260,280 310,190 Q330,160 325,130" fill="none" stroke="#a4b0c1" stroke-width="1.2" stroke-dasharray="5,5" opacity="0.2"/>
  <path d="M200,390 Q260,280 310,190 Q330,160 325,130" fill="none" stroke="#ffffff" stroke-width="0.3" stroke-dasharray="2,8" opacity="0.08"/>

  <!-- Abstract dream geometry (latch surface) -->
  <polygon points="300,105 335,95 348,120 330,145 295,140 288,118" fill="none" stroke="#a4b0c1" stroke-width="1.5" opacity="0.2"/>
  <polygon points="300,105 335,95 348,120 330,145 295,140 288,118" fill="#a4b0c1" opacity="0.03"/>
  <line x1="305" y1="115" x2="330" y2="110" stroke="#a4b0c1" stroke-width="0.3" opacity="0.1"/>
  <line x1="310" y1="125" x2="335" y2="130" stroke="#a4b0c1" stroke-width="0.3" opacity="0.08"/>

  <!-- Chain -->
  <path d="M200,390 L205,380 L195,370 L205,360 L195,350 L205,340 L195,330 L205,320 L195,310 L205,300 L195,290 L205,280 L195,270" fill="none" stroke="url(#chainGrad)" stroke-width="3" stroke-linecap="round"/>
  <path d="M200,390 L205,380 L195,370 L205,360 L195,350 L205,340 L195,330 L205,320 L195,310 L205,300 L195,290 L205,280 L195,270" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-linecap="round" opacity="0.12"/>

  <!-- Hook triple prongs -->
  <path d="M195,270 Q210,255 220,265 Q230,275 215,288" fill="none" stroke="url(#chainGrad)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M195,270 Q180,255 170,265 Q160,275 175,288" fill="none" stroke="#636e72" stroke-width="3" stroke-linecap="round"/>
  <path d="M195,270 Q195,252 200,248" fill="none" stroke="#a4b0c1" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Hook barb tips -->
  <path d="M220,280 L215,288 L225,285" fill="none" stroke="#dfe6e9" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M170,280 L175,288 L165,285" fill="none" stroke="#dfe6e9" stroke-width="2" stroke-linecap="round"/>
  <path d="M200,248 L203,242 L197,242" fill="none" stroke="#dfe6e9" stroke-width="2" stroke-linecap="round"/>

  <!-- Handle / grip -->
  <rect x="191" y="390" width="18" height="65" rx="4" fill="url(#handle)"/>

  <!-- Handle grip rings -->
  <rect x="191" y="395" width="18" height="3" fill="#a4b0c1" opacity="0.12"/>
  <rect x="191" y="405" width="18" height="3" fill="#a4b0c1" opacity="0.1"/>
  <rect x="191" y="415" width="18" height="3" fill="#a4b0c1" opacity="0.08"/>
  <rect x="191" y="425" width="18" height="3" fill="#a4b0c1" opacity="0.06"/>

  <!-- Hand guard -->
  <rect x="180" y="386" width="40" height="6" rx="2.5" fill="#576574"/>
  <rect x="180" y="386" width="40" height="2" rx="1" fill="#a4b0c1" opacity="0.15"/>

  <!-- Trigger -->
  <path d="M205,410 L205,424 Q205,428 201,428" fill="none" stroke="#a4b0c1" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- Handle rivets -->
  <circle cx="208" cy="400" r="1.5" fill="#636e72" opacity="0.3"/>
  <circle cx="208" cy="440" r="1.5" fill="#636e72" opacity="0.2"/>

  <!-- Pommel -->
  <ellipse cx="200" cy="458" rx="11" ry="4" fill="#2d3436"/>
  <ellipse cx="200" cy="458" rx="11" ry="4" fill="none" stroke="#a4b0c1" stroke-width="0.4" opacity="0.15"/>
  <circle cx="200" cy="460" r="3" fill="#576574"/>
  <circle cx="200" cy="460" r="1.5" fill="#a4b0c1" opacity="0.2"/>
</svg>
