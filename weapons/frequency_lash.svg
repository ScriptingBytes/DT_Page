<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2d3436"/>
      <stop offset="30%" stop-color="#636e72"/>
      <stop offset="70%" stop-color="#4a5568"/>
      <stop offset="100%" stop-color="#2d3436"/>
    </linearGradient>
    <radialGradient id="pulse" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#81ecec" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00cec9" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="400" height="500" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="396" height="496" rx="14" fill="none" stroke="#00cec9" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="200" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#c8d6e5" font-weight="bold">Frequency Lash</text>
  <text x="200" y="55" text-anchor="middle" font-family="monospace" font-size="11" fill="#00cec9">RANGED · RANK 7</text>

  <!-- Sonic pulse rings -->
  <circle cx="205" cy="125" r="80" fill="url(#pulse)"/>
  <circle cx="205" cy="125" r="70" fill="none" stroke="#00cec9" stroke-width="0.8" stroke-dasharray="8,4" opacity="0.15"/>
  <circle cx="205" cy="125" r="50" fill="none" stroke="#00cec9" stroke-width="0.6" stroke-dasharray="5,3" opacity="0.2"/>
  <circle cx="205" cy="125" r="30" fill="none" stroke="#81ecec" stroke-width="0.5" stroke-dasharray="3,2" opacity="0.25"/>

  <!-- Sound wave arcs -->
  <path d="M135,105 Q110,120 115,145" fill="none" stroke="#81ecec" stroke-width="2" opacity="0.35" filter="url(#glow)"/>
  <path d="M275,105 Q300,120 295,145" fill="none" stroke="#81ecec" stroke-width="2" opacity="0.35" filter="url(#glow)"/>
  <path d="M150,85 Q125,95 125,120" fill="none" stroke="#00cec9" stroke-width="1.5" opacity="0.2" filter="url(#glow)"/>
  <path d="M260,85 Q285,95 285,120" fill="none" stroke="#00cec9" stroke-width="1.5" opacity="0.2" filter="url(#glow)"/>

  <!-- Frequency waveform along lash body -->
  <path d="M195,310 Q185,300 195,290 Q205,280 195,270 Q185,260 195,250 Q205,240 195,230 Q185,220 195,210 Q205,200 195,190 Q185,180 195,170 Q205,160 195,150" fill="none" stroke="#81ecec" stroke-width="0.8" opacity="0.2"/>

  <!-- Lash energy cord -->
  <path d="M200,370 Q215,340 198,310 Q181,280 215,250 Q240,220 220,190 Q200,160 212,130" fill="none" stroke="#00cec9" stroke-width="5" stroke-linecap="round" filter="url(#glow)" opacity="0.85"/>
  <path d="M200,370 Q215,340 198,310 Q181,280 215,250 Q240,220 220,190 Q200,160 212,130" fill="none" stroke="#81ecec" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M200,370 Q215,340 198,310 Q181,280 215,250 Q240,220 220,190 Q200,160 212,130" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-linecap="round" opacity="0.2" stroke-dasharray="3,5"/>

  <!-- Sonic emitter tip -->
  <circle cx="212" cy="125" r="12" fill="#00cec9" opacity="0.2" filter="url(#softGlow)"/>
  <circle cx="212" cy="125" r="8" fill="#81ecec" opacity="0.35" filter="url(#glow)"/>
  <circle cx="212" cy="125" r="5" fill="#dfe6e9" opacity="0.5"/>
  <circle cx="212" cy="125" r="2.5" fill="#ffffff" opacity="0.8" filter="url(#glow)"/>

  <!-- Handle body -->
  <rect x="187" y="370" width="26" height="75" rx="4" fill="url(#handle)"/>
  <rect x="187" y="370" width="26" height="6" rx="2" fill="#00cec9" opacity="0.2"/>

  <!-- Handle grip rings -->
  <rect x="187" y="380" width="26" height="3" fill="#00cec9" opacity="0.15"/>
  <rect x="187" y="393" width="26" height="3" fill="#00cec9" opacity="0.12"/>
  <rect x="187" y="406" width="26" height="3" fill="#00cec9" opacity="0.1"/>
  <rect x="187" y="419" width="26" height="3" fill="#00cec9" opacity="0.08"/>
  <rect x="187" y="432" width="26" height="3" fill="#00cec9" opacity="0.05"/>

  <!-- Frequency resonator nodes on handle -->
  <circle cx="193" cy="386" r="2" fill="#81ecec" opacity="0.4"/>
  <circle cx="207" cy="386" r="2" fill="#81ecec" opacity="0.4"/>
  <circle cx="193" cy="412" r="1.5" fill="#81ecec" opacity="0.3"/>
  <circle cx="207" cy="412" r="1.5" fill="#81ecec" opacity="0.3"/>

  <!-- Handle butt -->
  <ellipse cx="200" cy="448" rx="14" ry="4" fill="#2d3436"/>
  <ellipse cx="200" cy="451" rx="10" ry="3" fill="none" stroke="#00cec9" stroke-width="0.8" opacity="0.2"/>

  <!-- Cooldown indicator -->
  <path d="M190,455 Q200,460 210,455" fill="none" stroke="#00cec9" stroke-width="1" stroke-dasharray="2,3" opacity="0.15"/>
</svg>
