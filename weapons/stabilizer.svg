<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <radialGradient id="liquid" cx="0.5" cy="0.6" r="0.6">
      <stop offset="0%" stop-color="#55efc4"/>
      <stop offset="40%" stop-color="#00b894"/>
      <stop offset="80%" stop-color="#00665e"/>
      <stop offset="100%" stop-color="#004d47"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="20%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="80%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="500" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="396" height="496" rx="14" fill="none" stroke="#00b894" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="200" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#c8d6e5" font-weight="bold">Stabilizer</text>
  <text x="200" y="55" text-anchor="middle" font-family="monospace" font-size="11" fill="#00b894">CONSUMABLE · ALL ROLES</text>

  <!-- Dissolution meter -->
  <rect x="140" y="85" width="120" height="14" rx="7" fill="#1a1a2e" stroke="#2d3436" stroke-width="1"/>
  <rect x="142" y="87" width="87" height="10" rx="5" fill="#d63031" opacity="0.5"/>
  <rect x="142" y="87" width="58" height="10" rx="5" fill="#e17055" opacity="0.5"/>
  <rect x="142" y="87" width="29" height="10" rx="5" fill="#fdcb6e" opacity="0.4"/>
  <!-- Meter ticks -->
  <line x1="172" y1="85" x2="172" y2="99" stroke="#636e72" stroke-width="0.5" opacity="0.3"/>
  <line x1="200" y1="85" x2="200" y2="99" stroke="#636e72" stroke-width="0.5" opacity="0.3"/>
  <line x1="228" y1="85" x2="228" y2="99" stroke="#636e72" stroke-width="0.5" opacity="0.3"/>

  <!-- 25% reduction arrow -->
  <path d="M200,108 L200,130 L184,118 L216,118 Z" fill="#55efc4" opacity="0.5" filter="url(#glow)"/>
  <path d="M200,108 L200,130" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
  <text x="200" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#55efc4" opacity="0.5">-25%</text>

  <!-- Vial body -->
  <path d="M172,195 L172,405 Q172,425 200,425 Q228,425 228,405 L228,195 Z" fill="url(#liquid)" stroke="#55efc4" stroke-width="0.8" opacity="0.7"/>
  <path d="M172,195 L172,405 Q172,425 200,425 Q228,425 228,405 L228,195 Z" fill="url(#glass)"/>

  <!-- Liquid surface meniscus -->
  <ellipse cx="200" cy="320" rx="28" ry="5" fill="#00b894" opacity="0.3"/>
  <ellipse cx="200" cy="320" rx="28" ry="3" fill="#55efc4" opacity="0.08"/>

  <!-- Bubbles -->
  <circle cx="188" cy="340" r="3.5" fill="#55efc4" opacity="0.2"/>
  <circle cx="210" cy="360" r="2.5" fill="#55efc4" opacity="0.15"/>
  <circle cx="193" cy="380" r="2" fill="#55efc4" opacity="0.12"/>
  <circle cx="208" cy="335" r="1.5" fill="#ffffff" opacity="0.1"/>
  <circle cx="196" cy="358" r="1.5" fill="#55efc4" opacity="0.1"/>
  <circle cx="212" cy="390" r="1" fill="#55efc4" opacity="0.08"/>
  <circle cx="185" cy="370" r="1" fill="#ffffff" opacity="0.06"/>

  <!-- Vial neck -->
  <rect x="186" y="178" width="28" height="17" rx="2" fill="#55efc4" opacity="0.4"/>
  <rect x="186" y="178" width="28" height="17" rx="2" fill="none" stroke="#dfe6e9" stroke-width="0.8"/>
  <rect x="186" y="178" width="28" height="3" fill="#ffffff" opacity="0.08"/>

  <!-- Cork/stopper -->
  <rect x="188" y="165" width="24" height="15" rx="3" fill="#b2bec3"/>
  <rect x="188" y="165" width="24" height="4" rx="2" fill="#dfe6e9" opacity="0.3"/>
  <rect x="188" y="176" width="24" height="2" fill="#636e72" opacity="0.2"/>

  <!-- Cork texture lines -->
  <line x1="192" y1="168" x2="192" y2="178" stroke="#636e72" stroke-width="0.3" opacity="0.2"/>
  <line x1="200" y1="166" x2="200" y2="179" stroke="#636e72" stroke-width="0.3" opacity="0.15"/>
  <line x1="208" y1="168" x2="208" y2="178" stroke="#636e72" stroke-width="0.3" opacity="0.1"/>

  <!-- Glass shine highlight -->
  <rect x="178" y="200" width="5" height="180" rx="2.5" fill="#ffffff" opacity="0.05"/>
  <rect x="176" y="210" width="3" height="120" rx="1.5" fill="#ffffff" opacity="0.03"/>
</svg>
