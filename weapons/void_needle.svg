<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="needle" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="15%" stop-color="#dfe6e9"/>
      <stop offset="40%" stop-color="#a4b0c1"/>
      <stop offset="70%" stop-color="#636e72"/>
      <stop offset="100%" stop-color="#576574"/>
    </linearGradient>
    <radialGradient id="voidAura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#6c5ce7" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>
  <rect width="400" height="500" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="396" height="496" rx="14" fill="none" stroke="#6c5ce7" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="200" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#c8d6e5" font-weight="bold">Void Needle</text>
  <text x="200" y="55" text-anchor="middle" font-family="monospace" font-size="11" fill="#6c5ce7">PRECISION · RANK 15 · GHOST</text>

  <!-- Void aura -->
  <ellipse cx="200" cy="240" rx="90" ry="150" fill="url(#voidAura)"/>

  <!-- Shadow wisps -->
  <path d="M120,180 Q135,168 125,158" fill="none" stroke="#6c5ce7" stroke-width="1.5" opacity="0.15"/>
  <path d="M280,290 Q265,300 275,310" fill="none" stroke="#6c5ce7" stroke-width="1.5" opacity="0.12"/>
  <path d="M110,270 Q120,280 112,290" fill="none" stroke="#6c5ce7" stroke-width="1" opacity="0.08"/>
  <path d="M290,200 Q280,192 288,182" fill="none" stroke="#6c5ce7" stroke-width="1" opacity="0.08"/>
  <path d="M140,130 Q130,140 138,148" fill="none" stroke="#a29bfe" stroke-width="0.8" opacity="0.06"/>
  <path d="M260,340 Q270,330 262,322" fill="none" stroke="#a29bfe" stroke-width="0.8" opacity="0.06"/>

  <!-- Needle body -->
  <line x1="200" y1="70" x2="200" y2="320" stroke="url(#needle)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="200" y1="70" x2="200" y2="320" stroke="#ffffff" stroke-width="0.5" stroke-linecap="round" opacity="0.15"/>

  <!-- Needle point -->
  <path d="M200,52 L200,75" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="200" cy="50" r="3.5" fill="#ffffff" opacity="0.7" filter="url(#glow)"/>
  <circle cx="200" cy="50" r="7" fill="#6c5ce7" opacity="0.15" filter="url(#softGlow)"/>
  <circle cx="200" cy="50" r="12" fill="#6c5ce7" opacity="0.05" filter="url(#softGlow)"/>

  <!-- Ghost inscriptions along needle -->
  <path d="M196,110 Q200,106 204,110 Q200,114 196,110" fill="none" stroke="#a29bfe" stroke-width="0.8" opacity="0.4"/>
  <path d="M196,140 Q200,136 204,140 Q200,144 196,140" fill="none" stroke="#a29bfe" stroke-width="0.8" opacity="0.35"/>
  <path d="M196,170 Q200,166 204,170 Q200,174 196,170" fill="none" stroke="#a29bfe" stroke-width="0.8" opacity="0.3"/>
  <path d="M196,200 Q200,196 204,200 Q200,204 196,200" fill="none" stroke="#a29bfe" stroke-width="0.8" opacity="0.25"/>
  <path d="M196,230 Q200,226 204,230 Q200,234 196,230" fill="none" stroke="#a29bfe" stroke-width="0.8" opacity="0.2"/>
  <path d="M196,260 Q200,256 204,260 Q200,264 196,260" fill="none" stroke="#a29bfe" stroke-width="0.6" opacity="0.15"/>

  <!-- Ghost rune marks -->
  <text x="200" y="160" text-anchor="middle" font-family="serif" font-size="5" fill="#a29bfe" opacity="0.2">◈</text>
  <text x="200" y="220" text-anchor="middle" font-family="serif" font-size="4" fill="#a29bfe" opacity="0.15">◈</text>

  <!-- Handle section -->
  <rect x="196" y="320" width="8" height="35" rx="1.5" fill="#2d3436"/>
  <rect x="196" y="322" width="8" height="3" fill="#6c5ce7" opacity="0.2"/>
  <rect x="196" y="332" width="8" height="3" fill="#6c5ce7" opacity="0.15"/>
  <rect x="196" y="342" width="8" height="3" fill="#6c5ce7" opacity="0.1"/>

  <!-- Ghost ring pommel -->
  <ellipse cx="200" cy="358" rx="10" ry="2.5" fill="none" stroke="#6c5ce7" stroke-width="1.5" opacity="0.35"/>
  <ellipse cx="200" cy="362" rx="6" ry="1.5" fill="none" stroke="#a29bfe" stroke-width="0.5" opacity="0.2"/>
  <circle cx="200" cy="362" r="2" fill="#6c5ce7" opacity="0.3" filter="url(#glow)"/>

  <!-- Single charge indicator -->
  <circle cx="200" cy="372" r="2.5" fill="#6c5ce7" opacity="0.5" filter="url(#glow)"/>
  <circle cx="200" cy="372" r="5" fill="#6c5ce7" opacity="0.1" filter="url(#softGlow)"/>

  <!-- Void energy particles -->
  <circle cx="155" cy="140" r="2" fill="#a29bfe" opacity="0.2" filter="url(#glow)"/>
  <circle cx="245" cy="190" r="1.5" fill="#a29bfe" opacity="0.15" filter="url(#glow)"/>
  <circle cx="160" cy="290" r="1.5" fill="#6c5ce7" opacity="0.12"/>
  <circle cx="240" cy="270" r="1" fill="#6c5ce7" opacity="0.1"/>
  <circle cx="170" cy="210" r="1" fill="#a29bfe" opacity="0.12"/>
  <circle cx="230" cy="150" r="1" fill="#a29bfe" opacity="0.1"/>
  <circle cx="180" cy="120" r="0.8" fill="#6c5ce7" opacity="0.08"/>
  <circle cx="225" cy="310" r="0.8" fill="#6c5ce7" opacity="0.06"/>
</svg>
