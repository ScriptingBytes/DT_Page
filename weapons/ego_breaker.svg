<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d63031"/>
      <stop offset="25%" stop-color="#b71540"/>
      <stop offset="50%" stop-color="#6b1d2a"/>
      <stop offset="75%" stop-color="#4a1520"/>
      <stop offset="100%" stop-color="#2d132c"/>
    </linearGradient>
    <linearGradient id="shaft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2d3436"/>
      <stop offset="20%" stop-color="#636e72"/>
      <stop offset="50%" stop-color="#7f8fa6"/>
      <stop offset="80%" stop-color="#636e72"/>
      <stop offset="100%" stop-color="#2d3436"/>
    </linearGradient>
    <radialGradient id="shatterAura" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#ff7675" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#d63031" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="400" height="500" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="396" height="496" rx="14" fill="none" stroke="#d63031" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="200" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#c8d6e5" font-weight="bold">Ego Breaker</text>
  <text x="200" y="55" text-anchor="middle" font-family="monospace" font-size="11" fill="#d63031">HEAVY · RANK 20</text>

  <!-- Shatter aura -->
  <ellipse cx="200" cy="240" rx="110" ry="140" fill="url(#shatterAura)" filter="url(#softGlow)"/>

  <!-- Reality cracks -->
  <path d="M70,180 L85,195 L75,210 L90,225" fill="none" stroke="#ff7675" stroke-width="1.2" opacity="0.2" filter="url(#glow)"/>
  <path d="M310,160 L295,175 L305,190 L290,205" fill="none" stroke="#ff7675" stroke-width="1.2" opacity="0.2" filter="url(#glow)"/>
  <path d="M100,130 L110,145 L100,155" fill="none" stroke="#d63031" stroke-width="0.8" opacity="0.15"/>
  <path d="M300,280 L290,295 L300,310 L285,325" fill="none" stroke="#d63031" stroke-width="0.8" opacity="0.12"/>
  <path d="M80,340 L95,350 L85,360" fill="none" stroke="#ff7675" stroke-width="0.8" opacity="0.1"/>
  <path d="M320,230 L310,240 L320,250" fill="none" stroke="#ff7675" stroke-width="0.8" opacity="0.1"/>

  <!-- Hammer head - main block -->
  <path d="M140,190 L200,170 L260,190 L260,285 L200,310 L140,285 Z" fill="url(#headGrad)" stroke="#d63031" stroke-width="1.5"/>
  <!-- Secondary impact face -->
  <path d="M255,200 L305,185 L295,290 L255,278 Z" fill="url(#headGrad)" stroke="#b71540" stroke-width="1.5" opacity="0.85"/>

  <!-- Ego face/eye motif -->
  <circle cx="205" cy="230" r="20" fill="none" stroke="#ff7675" stroke-width="1.5" opacity="0.3"/>
  <circle cx="205" cy="230" r="14" fill="none" stroke="#ff7675" stroke-width="1" opacity="0.2"/>
  <circle cx="205" cy="230" r="8" fill="#ff7675" opacity="0.1"/>
  <circle cx="205" cy="230" r="4" fill="#ff7675" opacity="0.15" filter="url(#glow)"/>
  <line x1="185" y1="215" x2="195" y2="225" stroke="#ff7675" stroke-width="1" opacity="0.2"/>
  <line x1="215" y1="215" x2="205" y2="225" stroke="#ff7675" stroke-width="1" opacity="0.2"/>

  <!-- Impact fissures on hammer head -->
  <path d="M225,200 L238,220 L230,242 L245,265" fill="none" stroke="#ff7675" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <path d="M165,245 L175,260 L170,278" fill="none" stroke="#ff7675" stroke-width="1" opacity="0.3"/>
  <path d="M250,210 L258,225 L252,240" fill="none" stroke="#ff7675" stroke-width="1" opacity="0.25"/>

  <!-- Energy fissures with glow -->
  <path d="M155,210 L165,220" fill="none" stroke="#ff7675" stroke-width="1.5" opacity="0.35" filter="url(#glow)"/>
  <path d="M255,225 L245,235" fill="none" stroke="#ff7675" stroke-width="1.5" opacity="0.35" filter="url(#glow)"/>
  <path d="M270,215 L260,225" fill="none" stroke="#ff7675" stroke-width="1" opacity="0.25" filter="url(#glow)"/>

  <!-- Metal studs on hammer head -->
  <circle cx="155" cy="210" r="3" fill="#7f8fa6" opacity="0.4"/>
  <circle cx="155" cy="270" r="3" fill="#7f8fa6" opacity="0.3"/>
  <circle cx="260" cy="220" r="2.5" fill="#7f8fa6" opacity="0.3"/>
  <circle cx="150" cy="240" r="2" fill="#7f8fa6" opacity="0.2"/>

  <!-- Reinforcing bands -->
  <rect x="180" y="185" width="18" height="4" rx="1" fill="#7f8fa6" opacity="0.3"/>
  <rect x="250" y="190" width="4" height="90" rx="1" fill="#7f8fa6" opacity="0.15"/>

  <!-- Shaft -->
  <rect x="193" y="310" width="14" height="120" rx="2" fill="url(#shaft)"/>
  <line x1="196" y1="310" x2="196" y2="430" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>

  <!-- Metal reinforcement bands on shaft -->
  <rect x="190" y="325" width="20" height="6" rx="1.5" fill="#2d3436"/>
  <rect x="190" y="325" width="20" height="2" rx="1" fill="#d63031" opacity="0.3"/>
  <rect x="190" y="360" width="20" height="8" rx="2" fill="#2d3436"/>
  <rect x="190" y="360" width="20" height="2" rx="1" fill="#d63031" opacity="0.25"/>
  <rect x="190" y="395" width="20" height="6" rx="1.5" fill="#2d3436"/>

  <!-- Leather grip wrapping -->
  <path d="M193,405 Q200,410 207,405" fill="none" stroke="#636e72" stroke-width="2" opacity="0.5"/>
  <path d="M193,415 Q200,420 207,415" fill="none" stroke="#636e72" stroke-width="2" opacity="0.4"/>
  <path d="M193,425 Q200,430 207,425" fill="none" stroke="#636e72" stroke-width="2" opacity="0.3"/>

  <!-- Pommel spike -->
  <path d="M196,430 L196,450 L204,450 L204,430" fill="#636e72"/>
  <polygon points="196,450 200,462 204,450" fill="#b71540"/>
  <line x1="200" y1="450" x2="200" y2="462" stroke="#ff7675" stroke-width="0.5" opacity="0.3"/>

  <!-- Ego shatter particles -->
  <polygon points="110,240 115,233 120,240 115,247" fill="#ff7675" opacity="0.3" filter="url(#glow)"/>
  <polygon points="290,260 295,254 300,260 295,266" fill="#ff7675" opacity="0.2" filter="url(#glow)"/>
  <polygon points="125,350 128,347 131,350 128,353" fill="#d63031" opacity="0.15"/>
  <polygon points="275,340 278,337 281,340 278,343" fill="#d63031" opacity="0.12"/>
  <rect x="95" y="300" width="3" height="3" fill="#ff7675" opacity="0.15" transform="rotate(20 96 301)"/>
  <rect x="300" y="310" width="3" height="3" fill="#ff7675" opacity="0.1" transform="rotate(35 301 311)"/>

  <!-- Dissolution drip effect -->
  <path d="M175,290 Q178,300 176,310" fill="none" stroke="#d63031" stroke-width="1" opacity="0.2"/>
  <path d="M230,295 Q227,305 229,315" fill="none" stroke="#d63031" stroke-width="0.8" opacity="0.15"/>
</svg>
