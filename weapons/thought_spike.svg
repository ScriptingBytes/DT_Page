<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="spikeShaft" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fdcb6e"/>
      <stop offset="20%" stop-color="#e17055"/>
      <stop offset="60%" stop-color="#636e72"/>
      <stop offset="100%" stop-color="#2d3436"/>
    </linearGradient>
    <linearGradient id="tipGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffeaa7"/>
      <stop offset="100%" stop-color="#fdcb6e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>
  <rect width="400" height="500" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="396" height="496" rx="14" fill="none" stroke="#e17055" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="200" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#c8d6e5" font-weight="bold">Thought Spike</text>
  <text x="200" y="55" text-anchor="middle" font-family="monospace" font-size="11" fill="#e17055">THROWN · RANK 12</text>

  <!-- Memory/brain wave ripples -->
  <path d="M90,270 Q110,250 130,270 Q150,290 170,270 Q190,250 210,270 Q230,290 250,270 Q270,250 290,270 Q310,290 320,275" fill="none" stroke="#fdcb6e" stroke-width="1" opacity="0.12" filter="url(#glow)"/>
  <path d="M110,300 Q130,285 150,300 Q170,315 190,300 Q210,285 230,300 Q250,315 270,300 Q290,285 300,295" fill="none" stroke="#fdcb6e" stroke-width="0.8" opacity="0.08" filter="url(#glow)"/>

  <!-- Memory insertion wave front -->
  <path d="M160,140 Q180,130 200,140 Q220,150 240,140" fill="none" stroke="#fdcb6e" stroke-width="1.2" opacity="0.25" filter="url(#glow)"/>
  <path d="M170,155 Q185,148 200,155 Q215,162 230,155" fill="none" stroke="#e17055" stroke-width="0.8" opacity="0.15"/>

  <!-- Spike shaft -->
  <line x1="200" y1="80" x2="200" y2="370" stroke="url(#spikeShaft)" stroke-width="5" stroke-linecap="round"/>
  <line x1="200" y1="80" x2="200" y2="370" stroke="#dfe6e9" stroke-width="1" stroke-linecap="round" opacity="0.15" stroke-dasharray="8,6"/>

  <!-- Spike head/tip -->
  <path d="M200,60 L200,85" stroke="url(#tipGrad)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M200,60 L200,85" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- Tip glow -->
  <circle cx="200" cy="55" r="8" fill="#fdcb6e" opacity="0.3" filter="url(#softGlow)"/>
  <circle cx="200" cy="55" r="5" fill="#ffeaa7" opacity="0.5" filter="url(#glow)"/>
  <circle cx="200" cy="55" r="2.5" fill="#ffffff" opacity="0.7"/>

  <!-- Memory engraving bands on shaft -->
  <path d="M192,120 Q200,115 208,120 Q200,125 192,120" fill="none" stroke="#e17055" stroke-width="1" opacity="0.5"/>
  <path d="M192,160 Q200,155 208,160 Q200,165 192,160" fill="none" stroke="#e17055" stroke-width="0.8" opacity="0.4"/>
  <path d="M192,200 Q200,195 208,200 Q200,205 192,200" fill="none" stroke="#e17055" stroke-width="0.8" opacity="0.3"/>
  <path d="M192,240 Q200,235 208,240 Q200,245 192,240" fill="none" stroke="#e17055" stroke-width="0.8" opacity="0.25"/>
  <path d="M192,280 Q200,275 208,280 Q200,285 192,280" fill="none" stroke="#e17055" stroke-width="0.8" opacity="0.2"/>

  <!-- Thought pattern runes -->
  <text x="200" y="150" text-anchor="middle" font-family="serif" font-size="5" fill="#fdcb6e" opacity="0.3">◈</text>
  <text x="200" y="230" text-anchor="middle" font-family="serif" font-size="4" fill="#fdcb6e" opacity="0.2">◈</text>

  <!-- Fletching upper tier -->
  <path d="M200,330 L180,355 L200,350 Z" fill="#e17055" opacity="0.4"/>
  <path d="M200,330 L220,355 L200,350 Z" fill="#d63031" opacity="0.3"/>
  <path d="M200,330 L185,350 L200,345 Z" fill="#fdcb6e" opacity="0.15"/>

  <!-- Fletching lower tier -->
  <path d="M200,350 L182,372 L200,367 Z" fill="#d63031" opacity="0.25"/>
  <path d="M200,350 L218,372 L200,367 Z" fill="#e17055" opacity="0.2"/>

  <!-- Fletching binding -->
  <ellipse cx="200" cy="350" rx="5" ry="2" fill="#576574" opacity="0.6"/>
  <ellipse cx="200" cy="367" rx="4" ry="1.5" fill="#576574" opacity="0.4"/>

  <!-- Glowing memory fragment ornaments -->
  <polygon points="172,170 177,165 182,170 177,175" fill="#fdcb6e" opacity="0.35" filter="url(#glow)"/>
  <polygon points="218,190 222,186 226,190 222,194" fill="#fdcb6e" opacity="0.25" filter="url(#glow)"/>

  <!-- Floating thought particles -->
  <circle cx="135" cy="200" r="2" fill="#fdcb6e" opacity="0.2" filter="url(#glow)"/>
  <circle cx="265" cy="180" r="1.5" fill="#fdcb6e" opacity="0.15" filter="url(#glow)"/>
  <circle cx="145" cy="310" r="1.5" fill="#e17055" opacity="0.12"/>
  <circle cx="255" cy="290" r="1" fill="#e17055" opacity="0.1"/>
  <circle cx="130" cy="260" r="1" fill="#fdcb6e" opacity="0.1"/>
  <circle cx="270" cy="250" r="1" fill="#fdcb6e" opacity="0.08"/>
</svg>
