<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="shardFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dfe6e9"/>
      <stop offset="25%" stop-color="#c8d6e5"/>
      <stop offset="50%" stop-color="#a4b0c1"/>
      <stop offset="75%" stop-color="#7f8fa6"/>
      <stop offset="100%" stop-color="#576574"/>
    </linearGradient>
    <linearGradient id="prism" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#a29bfe" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#00cec9" stop-opacity="0.1"/>
      <stop offset="70%" stop-color="#a29bfe" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="500" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="396" height="496" rx="14" fill="none" stroke="#6c5ce7" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="200" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#c8d6e5" font-weight="bold">Mirror Shard</text>
  <text x="200" y="55" text-anchor="middle" font-family="monospace" font-size="11" fill="#6c5ce7">DECEPTION · GHOST</text>

  <!-- Decoy silhouette -->
  <path d="M200,130 L182,175 L170,170 L163,192 L180,198 L185,240 L162,295 L180,300 L192,260 L200,305 L208,260 L220,300 L238,295 L215,240 L220,198 L237,192 L230,170 L218,175 Z" fill="#6c5ce7" opacity="0.08"/>
  <path d="M200,130 L182,175 L170,170 L163,192 L180,198 L185,240 L162,295 L180,300 L192,260 L200,305 L208,260 L220,300 L238,295 L215,240 L220,198 L237,192 L230,170 L218,175 Z" fill="none" stroke="#a29bfe" stroke-width="0.6" opacity="0.2"/>
  <!-- Decoy eye glint -->
  <circle cx="190" cy="190" r="2" fill="#a29bfe" opacity="0.15"/>
  <circle cx="210" cy="190" r="2" fill="#a29bfe" opacity="0.15"/>

  <!-- Mirror shard body -->
  <polygon points="200,335 235,365 215,415 165,392 175,348" fill="url(#shardFace)" stroke="#dfe6e9" stroke-width="0.8"/>
  <polygon points="200,335 235,365 215,415 165,392 175,348" fill="url(#prism)"/>

  <!-- Shard edge highlights -->
  <line x1="200" y1="335" x2="235" y2="365" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
  <line x1="235" y1="365" x2="215" y2="415" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>

  <!-- Reflective sheen -->
  <path d="M185,355 L210,375 L200,395" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.15"/>
  <path d="M190,360 L205,372" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.08"/>

  <!-- Internal prismatic reflections -->
  <line x1="195" y1="348" x2="180" y2="380" stroke="#a29bfe" stroke-width="0.5" opacity="0.2"/>
  <line x1="205" y1="350" x2="225" y2="395" stroke="#6c5ce7" stroke-width="0.5" opacity="0.15"/>
  <line x1="210" y1="370" x2="195" y2="400" stroke="#00cec9" stroke-width="0.3" opacity="0.1"/>

  <!-- Fracture lines -->
  <path d="M200,350 L192,372 L205,398" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.2"/>
  <path d="M218,365 L212,382" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.12"/>

  <!-- Light reflection rays -->
  <path d="M150,350 L130,325" fill="none" stroke="#a29bfe" stroke-width="1.2" opacity="0.15" filter="url(#glow)"/>
  <path d="M250,365 L270,340" fill="none" stroke="#a29bfe" stroke-width="1" opacity="0.12" filter="url(#glow)"/>
  <path d="M145,380 L125,375" fill="none" stroke="#6c5ce7" stroke-width="0.8" opacity="0.1"/>
  <path d="M230,405 L250,415" fill="none" stroke="#6c5ce7" stroke-width="0.8" opacity="0.08"/>
  <path d="M160,340 L140,315" fill="none" stroke="#a29bfe" stroke-width="0.6" opacity="0.08"/>
  <path d="M245,380 L265,390" fill="none" stroke="#a29bfe" stroke-width="0.6" opacity="0.06"/>
</svg>
