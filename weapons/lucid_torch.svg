<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <radialGradient id="flame" cx="0.5" cy="0.6" r="0.6">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="15%" stop-color="#ffeaa7"/>
      <stop offset="40%" stop-color="#fdcb6e"/>
      <stop offset="70%" stop-color="#e17055"/>
      <stop offset="100%" stop-color="#d63031" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="flameGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fdcb6e" stop-opacity="0.3"/>
