<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="threadGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a29bfe"/>
      <stop offset="30%" stop-color="#6c5ce7"/>
      <stop offset="60%" stop-color="#a29bfe"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
    <linearGradient id="weft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a29bfe" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <rect width="400" height="500" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="396" height="496" rx="14" fill="none" stroke="#6c5ce7" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="200" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#c8d6e5" font-weight="bold">Memory Weave</text>
  <text x="200" y="55" text-anchor="middle" font-family="monospace" font-size="11" fill="#6c5ce7">ENVIRONMENT · WEAVER</text>

  <!-- Original room geometry wireframe -->
  <path d="M80,140 L320,140 L320,360 L80,360 Z" fill="none" stroke="#6c5ce7" stroke-width="0.6" opacity="0.08" stroke-dasharray="6,4"/>

  <!-- Reshaped geometry -->
  <path d="M80,140 L320,140 L320,270 L260,240 L230,290 L180,260 L140,310 L110,280 L80,300 Z" fill="#6c5ce7" opacity="0.04"/>
  <path d="M80,140 L320,140 L320,270 L260,240 L230,290 L180,260 L140,310 L110,280 L80,300 Z" fill="none" stroke="#a29bfe" stroke-width="0.8" opacity="0.2"/>

  <!-- Weave warp threads (vertical) -->
  <line x1="110" y1="140" x2="110" y2="360" stroke="#6c5ce7" stroke-width="0.8" opacity="0.15"/>
  <line x1="140" y1="140" x2="140" y2="360" stroke="#6c5ce7" stroke-width="0.8" opacity="0.12"/>
  <line x1="170" y1="140" x2="170" y2="360" stroke="#6c5ce7" stroke-width="0.8" opacity="0.1"/>
  <line x1="230" y1="140" x2="230" y2="360" stroke="#6c5ce7" stroke-width="0.8" opacity="0.1"/>
  <line x1="260" y1="140" x2="260" y2="360" stroke="#6c5ce7" stroke-width="0.8" opacity="0.12"/>
  <line x1="290" y1="140" x2="290" y2="360" stroke="#6c5ce7" stroke-width="0.8" opacity="0.15"/>

  <!-- Weave weft threads (horizontal, active reshaping) -->
  <path d="M85,170 Q120,160 170,175 Q220,190 260,175 Q290,165 325,170" fill="none" stroke="url(#weft)" stroke-width="1.5" filter="url(#glow)"/>
  <path d="M80,210 Q130,195 180,210 Q230,225 280,210 Q305,200 320,205" fill="none" stroke="url(#weft)" stroke-width="1.2" filter="url(#glow)"/>
  <path d="M80,250 Q140,235 200,250 Q250,265 320,248" fill="none" stroke="url(#weft)" stroke-width="1" filter="url(#glow)"/>
  <path d="M85,290 Q130,278 180,290 Q220,302 260,288 Q290,278 315,285" fill="none" stroke="#a29bfe" stroke-width="0.8" opacity="0.2"/>
  <path d="M80,320 Q120,310 170,320 Q210,330 250,318 Q280,308 320,315" fill="none" stroke="#6c5ce7" stroke-width="0.6" opacity="0.15"/>

  <!-- Active reshaping threads (bright) -->
  <path d="M90,195 Q150,180 200,200 Q250,220 315,195" fill="none" stroke="url(#threadGrad)" stroke-width="1.5" opacity="0.45" filter="url(#softGlow)"/>
  <path d="M85,270 Q155,255 220,270 Q270,285 320,265" fill="none" stroke="url(#threadGrad)" stroke-width="1.2" opacity="0.35" filter="url(#softGlow)"/>

  <!-- Knot/nodes at weave intersections -->
  <circle cx="170" cy="175" r="2" fill="#a29bfe" opacity="0.4" filter="url(#glow)"/>
  <circle cx="200" cy="250" r="2" fill="#a29bfe" opacity="0.35" filter="url(#glow)"/>
  <circle cx="260" cy="175" r="1.5" fill="#a29bfe" opacity="0.3" filter="url(#glow)"/>
  <circle cx="140" cy="210" r="1.5" fill="#a29bfe" opacity="0.25"/>
  <circle cx="250" cy="290" r="1.5" fill="#6c5ce7" opacity="0.2"/>

  <!-- Blocked path indicator -->
  <path d="M300,360 L300,295" fill="none" stroke="#e17055" stroke-width="2.5" opacity="0.35"/>
  <line x1="294" y1="302" x2="306" y2="290" stroke="#e17055" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="294" y1="290" x2="306" y2="302" stroke="#e17055" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Weave device (spindle) -->
  <ellipse cx="200" cy="410" rx="28" ry="14" fill="#576574" stroke="#2d3436" stroke-width="1"/>
  <ellipse cx="200" cy="410" rx="28" ry="14" fill="none" stroke="#a29bfe" stroke-width="0.5" opacity="0.2"/>

  <!-- Spindle core -->
  <rect x="196" y="390" width="8" height="20" rx="2" fill="#636e72"/>

  <!-- Thread spool on spindle -->
  <ellipse cx="200" cy="390" rx="18" ry="7" fill="#2d3436" stroke="#6c5ce7" stroke-width="0.6"/>
  <path d="M184,390 Q200,382 216,390" fill="none" stroke="#a29bfe" stroke-width="1" opacity="0.3"/>
  <path d="M186,393 Q200,386 214,393" fill="none" stroke="#a29bfe" stroke-width="0.6" opacity="0.15"/>

  <!-- Spindle bobbin thread -->
  <path d="M200,390 Q210,380 215,370" fill="none" stroke="#6c5ce7" stroke-width="0.8" opacity="0.3"/>
  <path d="M200,390 Q190,380 185,370" fill="none" stroke="#6c5ce7" stroke-width="0.8" opacity="0.3"/>

  <!-- Loom needle -->
  <line x1="200" y1="390" x2="200" y2="365" stroke="#a4b0c1" stroke-width="2.5"/>
  <circle cx="200" cy="362" r="4" fill="#a4b0c1"/>
  <circle cx="200" cy="362" r="2" fill="#a29bfe" opacity="0.4" filter="url(#glow)"/>
  <ellipse cx="200" cy="362" rx="6" ry="2" fill="none" stroke="#6c5ce7" stroke-width="0.3" opacity="0.15"/>
</svg>
