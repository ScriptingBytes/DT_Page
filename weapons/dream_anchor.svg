<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="anchorMetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dfe6e9"/>
      <stop offset="30%" stop-color="#a4b0c1"/>
      <stop offset="70%" stop-color="#636e72"/>
      <stop offset="100%" stop-color="#2d3436"/>
    </linearGradient>
    <radialGradient id="pauseAura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00cec9" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00cec9" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="500" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="396" height="496" rx="14" fill="none" stroke="#00cec9" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="200" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#c8d6e5" font-weight="bold">Dream Anchor</text>
  <text x="200" y="55" text-anchor="middle" font-family="monospace" font-size="11" fill="#00cec9">DEFENSE · SINGLE USE · ALL</text>

  <!-- Collapse timer rings -->
  <circle cx="200" cy="230" r="80" fill="url(#pauseAura)"/>
  <circle cx="200" cy="230" r="75" fill="none" stroke="#00cec9" stroke-width="2" stroke-dasharray="471" stroke-dashoffset="0" opacity="0.08"/>
  <circle cx="200" cy="230" r="65" fill="none" stroke="#00cec9" stroke-width="1.5" stroke-dasharray="408" stroke-dashoffset="314" opacity="0.12"/>
  <circle cx="200" cy="230" r="55" fill="none" stroke="#00cec9" stroke-width="1" stroke-dasharray="345" stroke-dashoffset="172" opacity="0.15"/>
  <circle cx="200" cy="230" r="45" fill="none" stroke="#81ecec" stroke-width="0.8" stroke-dasharray="282" stroke-dashoffset="47" opacity="0.2"/>

  <!-- Pause symbol -->
  <rect x="180" y="210" width="8" height="40" rx="2" fill="#81ecec" opacity="0.6" filter="url(#glow)"/>
  <rect x="212" y="210" width="8" height="40" rx="2" fill="#81ecec" opacity="0.45" filter="url(#glow)"/>

  <!-- Anchor ring -->
  <circle cx="200" cy="310" r="22" fill="none" stroke="url(#anchorMetal)" stroke-width="6"/>
  <circle cx="200" cy="310" r="22" fill="none" stroke="#00cec9" stroke-width="1" opacity="0.2"/>
  <circle cx="200" cy="310" r="26" fill="none" stroke="#00cec9" stroke-width="0.3" opacity="0.08"/>

  <!-- Anchor shaft -->
  <rect x="195" y="332" width="10" height="55" rx="1" fill="#636e72"/>
  <line x1="197" y1="332" x2="197" y2="387" stroke="#ffffff" stroke-width="0.3" opacity="0.1"/>

  <!-- Anchor crossbar -->
  <rect x="178" y="355" width="44" height="6" rx="2" fill="#576574"/>
  <rect x="178" y="355" width="44" height="2" rx="1" fill="#a4b0c1" opacity="0.2"/>

  <!-- Crossbar end caps -->
  <rect x="175" y="353" width="6" height="10" rx="1.5" fill="#2d3436"/>
  <rect x="219" y="353" width="6" height="10" rx="1.5" fill="#2d3436"/>

  <!-- Anchor flukes -->
  <path d="M178,382 Q155,400 165,412 Q175,400 188,398 L195,387" fill="#576574" stroke="#2d3436" stroke-width="0.5"/>
  <path d="M222,382 Q245,400 235,412 Q225,400 212,398 L205,387" fill="#636e72" stroke="#2d3436" stroke-width="0.5"/>

  <!-- Fluke tips -->
  <circle cx="167" cy="410" r="2" fill="#7f8fa6" opacity="0.3"/>
  <circle cx="233" cy="410" r="2" fill="#7f8fa6" opacity="0.3"/>

  <!-- Chain links -->
  <ellipse cx="200" cy="280" rx="7" ry="9" fill="none" stroke="#576574" stroke-width="2.5"/>
  <ellipse cx="200" cy="280" rx="7" ry="9" fill="none" stroke="#00cec9" stroke-width="0.3" opacity="0.15"/>
  <ellipse cx="200" cy="296" rx="6" ry="8" fill="none" stroke="#636e72" stroke-width="2.5"/>
</svg>
