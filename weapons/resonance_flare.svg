<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <radialGradient id="burst" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="15%" stop-color="#ffeaa7" stop-opacity="0.25"/>
      <stop offset="35%" stop-color="#fdcb6e" stop-opacity="0.1"/>
      <stop offset="60%" stop-color="#e17055" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#d63031" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="medGlow">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>
  <rect width="400" height="500" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="396" height="496" rx="14" fill="none" stroke="#fdcb6e" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="200" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#c8d6e5" font-weight="bold">Resonance Flare</text>
  <text x="200" y="55" text-anchor="middle" font-family="monospace" font-size="11" fill="#fdcb6e">COMBAT · WARRIOR</text>

  <!-- Blind burst radius -->
  <circle cx="200" cy="220" r="120" fill="url(#burst)" filter="url(#bigGlow)"/>
  <circle cx="200" cy="220" r="100" fill="none" stroke="#ffeaa7" stroke-width="0.5" opacity="0.08"/>

  <!-- Burst rays -->
  <line x1="200" y1="220" x2="80" y2="100" stroke="#ffeaa7" stroke-width="2.5" opacity="0.2" filter="url(#glow)"/>
  <line x1="200" y1="220" x2="320" y2="100" stroke="#ffeaa7" stroke-width="2.5" opacity="0.2" filter="url(#glow)"/>
  <line x1="200" y1="220" x2="80" y2="340" stroke="#ffeaa7" stroke-width="2" opacity="0.15" filter="url(#glow)"/>
  <line x1="200" y1="220" x2="320" y2="340" stroke="#ffeaa7" stroke-width="2" opacity="0.15" filter="url(#glow)"/>
  <line x1="200" y1="220" x2="200" y2="90" stroke="#ffffff" stroke-width="2" opacity="0.25" filter="url(#glow)"/>
  <line x1="200" y1="220" x2="200" y2="350" stroke="#ffffff" stroke-width="1.5" opacity="0.12" filter="url(#glow)"/>
  <line x1="200" y1="220" x2="70" y2="220" stroke="#ffffff" stroke-width="2" opacity="0.15" filter="url(#glow)"/>
  <line x1="200" y1="220" x2="330" y2="220" stroke="#ffffff" stroke-width="2" opacity="0.15" filter="url(#glow)"/>
  <line x1="200" y1="220" x2="110" y2="130" stroke="#ffeaa7" stroke-width="1" opacity="0.08"/>
  <line x1="200" y1="220" x2="290" y2="130" stroke="#ffeaa7" stroke-width="1" opacity="0.08"/>
  <line x1="200" y1="220" x2="110" y2="310" stroke="#ffeaa7" stroke-width="1" opacity="0.06"/>
  <line x1="200" y1="220" x2="290" y2="310" stroke="#ffeaa7" stroke-width="1" opacity="0.06"/>

  <!-- Flash epicenter -->
  <circle cx="200" cy="220" r="20" fill="#ffffff" opacity="0.5" filter="url(#bigGlow)"/>
  <circle cx="200" cy="220" r="12" fill="#ffeaa7" opacity="0.6" filter="url(#medGlow)"/>
  <circle cx="200" cy="220" r="6" fill="#ffffff" opacity="0.8" filter="url(#glow)"/>
  <circle cx="200" cy="220" r="3" fill="#ffffff" opacity="1"/>

  <!-- Flare device body -->
  <rect x="192" y="365" width="16" height="85" rx="3" fill="#2d3436" stroke="#636e72" stroke-width="1"/>

  <!-- Flare head -->
  <rect x="184" y="348" width="32" height="20" rx="5" fill="#576574" stroke="#fdcb6e" stroke-width="1"/>
  <rect x="184" y="348" width="32" height="20" rx="5" fill="#fdcb6e" opacity="0.06"/>

  <!-- Flare head banding -->
  <rect x="184" y="358" width="32" height="3" fill="#2d3436" opacity="0.4"/>
  <rect x="184" y="362" width="32" height="2" fill="#fdcb6e" opacity="0.1"/>

  <!-- Ignition cap -->
  <rect x="190" y="338" width="20" height="12" rx="3" fill="#636e72"/>
  <rect x="194" y="340" width="12" height="8" rx="2" fill="#e17055" opacity="0.4"/>
  <rect x="194" y="340" width="12" height="2" fill="#ff7675" opacity="0.15"/>

  <!-- Handle grip -->
  <rect x="192" y="375" width="16" height="4" fill="#636e72" opacity="0.3"/>
  <rect x="192" y="390" width="16" height="4" fill="#636e72" opacity="0.25"/>
  <rect x="192" y="405" width="16" height="4" fill="#636e72" opacity="0.2"/>
  <rect x="192" y="420" width="16" height="4" fill="#636e72" opacity="0.15"/>

  <!-- Pull ring -->
  <circle cx="200" cy="455" r="7" fill="none" stroke="#636e72" stroke-width="2.5"/>
  <circle cx="200" cy="455" r="7" fill="none" stroke="#fdcb6e" stroke-width="0.5" opacity="0.2"/>
  <circle cx="200" cy="455" r="11" fill="none" stroke="#fdcb6e" stroke-width="0.3" opacity="0.08" filter="url(#glow)"/>

  <!-- Pin -->
  <line x1="200" y1="455" x2="200" y2="445" stroke="#636e72" stroke-width="1.5"/>
  <circle cx="200" cy="443" r="2" fill="#fdcb6e" opacity="0.3"/>
</svg>
